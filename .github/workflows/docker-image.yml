name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '21'


    - name: Build Jar
      run: |
          chmod +x ./mvnx
          ./mvn clean package -DskipTests

    - name: Login to Docker Hub
      run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker Image 
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-cicd-demo:latest

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
         host: ${{ secrets.EC2_HOST }}
         username: ${{ secrets.EC2_USER }}
         key: ${{ secrets.EC2_SSH_KEY }}
         script: |
             docker stop spring-demo || true
             docker rm spring-demo || true
             docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-cicd-demo:latest
             docker run -d --name spring-demo -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-cicd-demo:latest
             
